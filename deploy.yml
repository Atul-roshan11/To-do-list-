name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==============================
  # 1. TEST JOB
  # ==============================
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Caches dependencies to speed up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest # Ensures testing framework is available

      - name: Run Tests with Pytest
        run: |
          # Replace 'pytest' with your specific test command if you aren't using pytest
          pytest

  # ==============================
  # 2. BUILD JOB
  # ==============================
  build:
    name: Build Application Artifacts
    runs-on: ubuntu-latest
    needs: test # Requires the test job to pass successfully before running

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Uploading the compiled build folder so the Deploy job can access it
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vercel-artifacts
          path: .vercel/output
          retention-days: 1

  # ==============================
  # 3. DEPLOY JOB
  # ==============================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build # Requires the build job to finish successfully before running

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Download the pre-compiled artifacts generated in the build step
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: vercel-artifacts
          path: .vercel/output

      # Deploy using the prebuilt flags to complete the cycle instantly
      - name: Deploy Project to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}